spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/birthdaydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.driver-class-name=org.postgresql.Driver

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Set server startup grace period
server.startup.grace-period=120s

# Disable checks for Spring Boot during startup
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Logging for troubleshooting
logging.level.org.springframework.boot.availability=DEBUG
logging.level.org.springframework.web=DEBUG

# Explicitly set health probe path to match Istio configuration
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=health
