<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Birthday Tekken</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
    <h1>Urodzinowy Turniej Tekkena</h1>

    <div id="setup-section">
        <h2>Nowy Turniej</h2>

        <!-- 👇 nowe pole na nazwę turnieju -->
        <input type="text" id="tournamentName" placeholder="Enter tournament name" />

        <textarea id="players" rows="10" placeholder="Enter player names (one per line)"></textarea>
    </div>

    <p>
        <button onclick="startTournament()">i Leecimy kochani</button>
    </p>

    <div id="tournament-section" style="display: none;">
        <div class="tournament-info">
            <h2 id="tournament-title">Tournament: <span id="tournament-name"></span></h2>
            <h3>Round: <span id="current-round"></span></h3>
            <div id="tournament-status"></div>
        </div>

        <div id="matches"></div>
        <button onclick="submitResults()" id="submit-button">Submit Results</button>

        <div class="history-section" id="history-section" style="display:none;">
            <h3>Tournament: match history</h3>
            <div id="history-content"></div>
        </div>
    </div>
</main>

<div class="bottom-button">
    <a href="/matches.html">
        <button>Pokaż wszystkie mecze</button>
    </a>
</div>
<script src="/app.js?v=1"></script>
</body>
</html>
