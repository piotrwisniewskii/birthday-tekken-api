<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wszystkie mecze</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-matches">
<main class="page-shell">
    <section class="hero-panel hero-panel-compact">
        <div class="hero-copy">
            <p class="eyebrow">Match archive</p>
            <h1>Lista wszystkich meczow</h1>
            <p class="hero-text">
                Pelna historia pojedynkow zapisanych przez aplikacje, razem z rundami,
                zwyciezcami i wolnymi losami.
            </p>
        </div>
        <div class="hero-badge-stack">
            <a class="ghost-link ghost-link-bright" href="/">Powrot do turnieju</a>
        </div>
    </section>

    <section class="panel-card archive-card">
        <div class="archive-toolbar">
            <div>
                <p class="section-kicker">Archiwum</p>
                <h2>Zapisane mecze</h2>
            </div>
            <form action="/api/tournament/matches/delete-all" method="post"
                  onsubmit="return confirm('Na pewno usunąć WSZYSTKIE mecze? Tej operacji nie można cofnąć.');">
                <button type="submit" class="danger-btn">Usun wszystkie mecze</button>
            </form>
        </div>

        <div class="table-shell">
            <table id="matches-table">
                <thead>
                <tr>
                    <th>Turniej</th>
                    <th>ID</th>
                    <th>Gracz 1</th>
                    <th>Gracz 2</th>
                    <th>Zwyciezca</th>
                    <th>Runda</th>
                    <th>Bye</th>
                    <th>Czas meczu</th>
                </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </section>
</main>


<script>
    async function loadMatches() {
        try {
            const response = await fetch('/api/tournament/matches/all');
            if (!response.ok) {
                throw new Error("Błąd wczytywania danych");
            }
            const matches = await response.json();
            const tbody = document.querySelector("#matches-table tbody");
            tbody.innerHTML = "";

            matches.forEach(match => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${match.tournamentName || "-"}</td>
                    <td>${match.id}</td>
                    <td>${match.player1 || "-"}</td>
                    <td>${match.player2 || "-"}</td>
                    <td>${match.winner || "-"}</td>
                    <td>${match.round || "-"}</td>
                    <td>${match.byeMatch ? "✔" : ""}</td>
                    <td>${match.matchTime ? new Date(match.matchTime).toLocaleString() : "-"}</td>
                `;
                tbody.appendChild(row);
            });

        } catch (err) {
            alert(err.message);
        }
    }

    loadMatches();
</script>
</body>
</html>
