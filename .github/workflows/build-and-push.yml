name: Build and Push Docker image

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  actions: read

jobs:
  verify-dependency-scan-recency:
    runs-on: ubuntu-latest
    steps:
      - name: Validate recent successful dependency scan
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'dependency-scan.yml';
            const maxAgeDays = 30;
            const cutoff = Date.now() - maxAgeDays * 24 * 60 * 60 * 1000;

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id,
              per_page: 100,
              event: 'workflow_dispatch'
            });

            const acceptable = runs.find((run) => {
              if (run.status !== 'completed') return false;
              if (run.conclusion !== 'success') return false;
              if (!run.created_at) return false;
              return new Date(run.created_at).getTime() >= cutoff;
            });

            if (!acceptable) {
              core.setFailed(
                'Brak udanego, manualnie uruchomionego dependency scan (workflow_dispatch) z ostatnich 30 dni. ' +
                'Uruchom workflow "Dependency Vulnerability Scan" i sproboj ponownie.'
              );
            } else {
              core.info(`Dependency scan gate passed with run #${acceptable.run_number} from ${acceptable.created_at}.`);
            }

  test-and-scan:
    runs-on: ubuntu-latest
    needs: verify-dependency-scan-recency
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: birthdaydb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d birthdaydb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/birthdaydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespw
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        run: ./mvnw -B clean verify

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/birthday-tekken-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/birthday-tekken-api:latest
