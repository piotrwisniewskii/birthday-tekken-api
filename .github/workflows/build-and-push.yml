name: Build and Push Docker image

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: birthdaydb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d birthdaydb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/birthdaydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespw
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-trivy-

      - name: Run tests
        run: ./mvnw -B clean verify

      - name: Preload Maven dependencies
        run: ./mvnw -B -q -DskipTests dependency:go-offline

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Run Trivy dependency scan
        id: dependency_scan
        run: |
          set +e
          mkdir -p target
          trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --format json \
            --output target/trivy-report.json \
            --exit-code 1 \
            --timeout 10m \
            --no-progress \
            .
          scan_exit_code=$?

          trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --format table \
            --output target/trivy-report.txt \
            --exit-code 0 \
            --timeout 10m \
            --no-progress \
            .
          set -e

          if [ -s target/trivy-report.json ] && [ -s target/trivy-report.txt ]; then
            echo "report_generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "report_generated=false" >> "$GITHUB_OUTPUT"
          fi

          echo "scan_exit_code=$scan_exit_code" >> "$GITHUB_OUTPUT"

      - name: Add dependency scan summary
        if: always()
        run: |
          {
            echo "## Dependency Scan"
            echo
            echo "- Scanner: Trivy"
            echo "- Report generated: ${{ steps.dependency_scan.outputs.report_generated }}"
            echo "- Scan exit code: ${{ steps.dependency_scan.outputs.scan_exit_code }}"
            echo "- Reports: target/trivy-report.json, target/trivy-report.txt"
            echo "- Severity threshold: HIGH,CRITICAL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-report
          path: |
            target/trivy-report.json
            target/trivy-report.txt
          if-no-files-found: warn

      - name: Fail if report was not generated
        if: always() && steps.dependency_scan.outputs.report_generated != 'true'
        run: |
          echo "Dependency scan did not produce target/trivy-report.json and target/trivy-report.txt."
          exit 1

      - name: Fail on detected vulnerabilities
        if: always() && steps.dependency_scan.outputs.report_generated == 'true' && steps.dependency_scan.outputs.scan_exit_code != '0'
        run: |
          echo "Trivy detected HIGH or CRITICAL vulnerabilities."
          echo "See target/trivy-report.txt in the workflow artifact dependency-scan-report."
          exit 1

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/birthday-tekken-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/birthday-tekken-api:latest
