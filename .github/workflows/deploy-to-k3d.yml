name: Deploy to k3d (manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. commit sha or "latest")'
        required: true
        default: 'latest'
      postgres_password:
        description: 'Postgres password for demo secret'
        required: false
        default: 'postgrespw'
      rabbit_password:
        description: 'RabbitMQ password for demo secret'
        required: false
        default: 'apppass'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k3d (install script)
        run: |
          # install k3d on the runner using the official install script
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d --version

      - name: Create k3d cluster
        run: |
          k3d cluster create demo-cluster --wait || k3d cluster create demo-cluster --wait

      - name: Install kubectl (stable)
        # azure/setup-kubectl sometimes requests a specific version that may not be available
        # Install the stable kubectl binary for the runner architecture directly.
        run: |
          set -euo pipefail
          arch=amd64
          if [ "$(uname -m)" = "aarch64" ] || [ "$(uname -m)" = "arm64" ]; then
            arch=arm64
          fi
          # Get the stable release tag (e.g. v1.27.6)
          RELEASE=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          echo "Installing kubectl ${RELEASE} for architecture ${arch}"
          curl -LO "https://dl.k8s.io/${RELEASE}/bin/linux/${arch}/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          # Newer kubectl releases may remove the --short flag; try a modern output first
          kubectl version --client --output=yaml || kubectl version --client || true

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Docker login (optional) and import image into k3d
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          # Use the image from the build-and-push workflow: ${DOCKERHUB_USERNAME}/birthday-tekken-api:${IMAGE_TAG}
          IMAGE_REPO="${DOCKERHUB_USERNAME}/birthday-tekken-api"
          IMAGE="$IMAGE_REPO:$IMAGE_TAG"
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Logging into Docker Hub"
            echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin
          else
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set — attempting anonymous pull"
          fi
          echo "Pulling image $IMAGE"
          docker pull "$IMAGE"
          echo "Importing image into k3d cluster"
          k3d image import --cluster demo-cluster "$IMAGE"

      - name: Ensure namespace and create demo secrets
        env:
          NAMESPACE: birthday
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ inputs.postgres_password }}
          RABBIT_USER: appuser
          RABBIT_PASSWORD: ${{ inputs.rabbit_password }}
        run: |
          kubectl create ns "$NAMESPACE" || true
          kubectl -n "$NAMESPACE" create secret generic postgresql-auth \
            --from-literal=username="$POSTGRES_USER" \
            --from-literal=password="$POSTGRES_PASSWORD" \
            --from-literal=database=birthdaydb || true
          # NOTE: rabbitmq-auth is created by the Helm chart (it is managed by the chart)
          # Do not create `rabbitmq-auth` here — creating it manually causes a conflict
          # because Helm cannot adopt existing resources that lack Helm ownership metadata.
          # If you need to provide custom RabbitMQ credentials, set them via Helm values
          # (e.g. --set rabbitmq.username=... --set rabbitmq.password=...) instead.

      - name: Helm upgrade/install chart
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          NAMESPACE: birthday
        run: |
          IMAGE_REPO="${DOCKERHUB_USERNAME}/birthday-tekken-api"
          helm upgrade --install birthday-tekken-api ./k8s -n "$NAMESPACE" \
            --create-namespace --wait --timeout 5m \
            --set app.image.repository="$IMAGE_REPO" \
            --set app.image.tag="$IMAGE_TAG" \
            --set app.image.pullPolicy=IfNotPresent \
            --set postgresql.existingSecret=postgresql-auth

      - name: Show deployed resources
        env:
          NAMESPACE: birthday
        run: |
          kubectl -n "$NAMESPACE" get all
          kubectl -n "$NAMESPACE" get ingress || true
