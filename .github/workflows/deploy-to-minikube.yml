name: Deploy to Minikube

# This workflow is intended to run on a self-hosted runner that already
# has Minikube, kubectl and helm installed and configured.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. git sha or "latest")'
        required: true
        default: 'latest'

jobs:
  deploy:
    # NOTE: this requires a self-hosted runner that has Minikube available.
    runs-on: [self-hosted, minikube]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to local Minikube
        env:
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          ./scripts/deploy-minikube.sh "${{ secrets.DOCKERHUB_USERNAME }}/birthday-tekken-api:${{ github.event.inputs.image_tag }}"
