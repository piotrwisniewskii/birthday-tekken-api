namespace: birthday

app:
  image:
    repository: piowisni/birthday-tekken-api
    tag: latest            # i tak wstrzykniesz nowy w deploy.sh
    pullPolicy: Always
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "256Mi"

service:
  type: ClusterIP
  port: 8080

postgresql:
  enabled: true
  image: postgres:16-alpine
  username: postgres
  password: changeme
  database: birthdaydb
  storage: 2Gi
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "100m"
      memory: "768Mi"
      
ingress:
  enabled: true
  className: nginx
  host: ""
  path: /
  pathType: Prefix
  annotations: {}

createNamespace: false
