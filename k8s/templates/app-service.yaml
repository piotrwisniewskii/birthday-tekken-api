apiVersion: v1
kind: Service
metadata:
  name: {{ include "birthday-tekken-api.name" . }}   
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "birthday-tekken-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ include "birthday-tekken-api.name" . }}  
  ports:
    - name: http
      port: {{ .Values.service.port | default 8080 }}  
      targetPort: 8080                  
