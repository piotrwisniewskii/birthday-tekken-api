apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-auth
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.rabbitmq.username | default "admin" | quote }}
  password: {{ .Values.rabbitmq.password | default "admin" | quote }}
  vhost:    {{ .Values.rabbitmq.vhost    | default "/"        | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: {{ .Release.Namespace }}
data:
  rabbitmq.conf: |
    # Pamięć/dysk w konfiguracji (ENV są deprec.)
    vm_memory_high_watermark.relative = 0.6
    disk_free_limit.absolute = 50MB

    # Panel www
    management.tcp.port = 15672

    # (opcjonalnie) nie blokuj 'guest'
    loopback_users.guest = false
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: {{ .Release.Namespace }}
  labels:
    app: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: mgmt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: {{ .Release.Namespace }}
  labels:
    app: rabbitmq
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          imagePullPolicy: IfNotPresent

          # Użytkownik/hasło/vhost – te ENV są wspierane
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom: { secretKeyRef: { name: rabbitmq-auth, key: username } }
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom: { secretKeyRef: { name: rabbitmq-auth, key: password } }
            - name: RABBITMQ_DEFAULT_VHOST
              valueFrom: { secretKeyRef: { name: rabbitmq-auth, key: vhost } }

          ports:
            - name: amqp
              containerPort: 5672
            - name: mgmt
              containerPort: 15672

          readinessProbe:
            exec: { command: ["rabbitmq-diagnostics","-q","ping"] }
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            exec: { command: ["rabbitmq-diagnostics","-q","ping"] }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          volumeMounts:
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf

      volumes:
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
            items:
              - key: rabbitmq.conf
                path: rabbitmq.conf
