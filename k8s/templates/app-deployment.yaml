apiVersion: v1
kind: Service
metadata:
  name: birthday-api
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
  selector:
    app: birthday-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: birthday-api
  namespace: {{ .Values.namespace }}
  labels:
    app: birthday-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: birthday-api
  template:
    metadata:
      labels:
        app: birthday-api
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: birthday-tekken-api
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: 8080
          # Temporarily removing probes until application stabilizes
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/{{ .Values.postgresql.database }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgresql.username }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.postgresql.password }}
