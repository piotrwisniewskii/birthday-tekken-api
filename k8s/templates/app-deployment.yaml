apiVersion: v1
kind: Service
metadata:
  name: birthday-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: birthday-api
spec:
  type: "{{ .Values.service.type | default "ClusterIP" }}"
  selector:
    app: birthday-api
  ports:
    - name: http
      port: {{ .Values.service.port | default 8080 }}
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: birthday-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: birthday-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: birthday-api
  template:
    metadata:
      labels:
        app: birthday-api
      annotations:
    spec:
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgresql.image | default "postgres:16-alpine" }}"
          command: ["sh","-c"]
          args:
            - >
              until pg_isready -h postgres -p 5432 -U {{ .Values.postgresql.username | default "postgres" }};
              do echo "waiting for postgres..."; sleep 2; done; echo "postgres is ready."
          env:
            - name: PGPASSWORD
              value: "{{ .Values.postgresql.password | default "changeme" }}"
      containers:
        - name: birthday-api
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: "{{ .Values.app.image.pullPolicy | default "Always" }}"
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/{{ .Values.postgresql.database | default "birthdaydb" }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.postgresql.username | default "postgres" }}"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "{{ .Values.postgresql.password | default "changeme" }}"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 120
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "{{ .Values.app.resources.requests.cpu | default "100m" }}"
              memory: "{{ .Values.app.resources.requests.memory | default "256Mi" }}"
            limits:
              cpu: "{{ .Values.app.resources.limits.cpu | default "500m" }}"
              memory: "{{ .Values.app.resources.limits.memory | default "512Mi" }}"
