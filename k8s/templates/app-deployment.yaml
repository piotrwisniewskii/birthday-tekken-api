apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "birthday-tekken-api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "birthday-tekken-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "birthday-tekken-api.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "birthday-tekken-api.name" . }}
        {{- include "birthday-tekken-api.labels" . | nindent 8 }}
    spec:
      # Czekaj na RabbitMQ zanim kontener aplikacji wystartuje
      initContainers:
        - name: wait-for-rabbit
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for rabbitmq:5672...";
              until nc -z rabbitmq 5672; do
                echo "RabbitMQ not ready yet, sleeping 2s";
                sleep 2;
              done
              echo "RabbitMQ is reachable."
      containers:
        - name: {{ include "birthday-tekken-api.name" . }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy | default "IfNotPresent" }}

          # Nazwany port 'http' (używany przez proby i/lub Service)
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 8080 }}

          # ===== PROBY APLIKACJI (Spring Actuator) =====
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 2

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          # ===== ENV: Postgres + RabbitMQ =====
          env:
            # --- Postgres ---
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/{{ .Values.postgresql.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: username
              {{- else }}
              value: "{{ .Values.postgresql.username }}"
              {{- end }}
            - name: SPRING_DATASOURCE_PASSWORD
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: password
              {{- else }}
              value: "{{ .Values.postgresql.password }}"
              {{- end }}

            # --- RabbitMQ (zgodne z application.properties) ---
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-auth
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-auth
                  key: password
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-auth
                  key: vhost

          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
