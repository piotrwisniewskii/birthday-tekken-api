apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "birthday-tekken-api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "birthday-tekken-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "birthday-tekken-api.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "birthday-tekken-api.name" . }}
        {{- include "birthday-tekken-api.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "birthday-tekken-api.name" . }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 8080 }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
