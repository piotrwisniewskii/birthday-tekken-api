apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: tcp
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image | default "postgres:16-alpine" }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
{{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: database
{{- else }}
              value: {{ .Values.postgresql.database | default "birthdaydb" }}
{{- end }}
            - name: POSTGRES_USER
{{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: username
{{- else }}
              value: {{ .Values.postgresql.username | default "postgres" }}
{{- end }}
            - name: POSTGRES_PASSWORD
{{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: password
{{- else }}
              value: {{ .Values.postgresql.password | default "changeme" }}
{{- end }}
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: {{ .Values.postgresql.resources.requests.cpu | default "100m" }}
              memory: {{ .Values.postgresql.resources.requests.memory | default "512Mi" }}
            limits:
              cpu: {{ .Values.postgresql.resources.limits.cpu | default "500m" }}
              memory: {{ .Values.postgresql.resources.limits.memory | default "1Gi" }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage | default "2Gi" }}
